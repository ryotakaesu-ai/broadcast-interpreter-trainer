function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function pick(arr, n) { return shuffle([...arr]).slice(0, n); }
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Vocabulary: EN -> JA or JA -> EN multiple choice
function genVocabQ(direction /* 'en2ja' | 'ja2en' | 'mix' */) {
  const dir = direction === 'mix' ? (Math.random() < 0.5 ? 'en2ja' : 'ja2en') : direction;
  const item = rand(VOCAB);
  const distractors = pick(VOCAB.filter(v => v.en !== item.en), 3);
  const opts = shuffle([item, ...distractors]);
  if (dir === 'en2ja') {
    return {
      prompt: item.en,
      promptIsEn: true,
      hint: `${TOPIC_LABEL[item.topic] || item.topic} · 意味として最も適切なものは？`,
      topic: item.topic,
      options: opts.map(o => o.ja),
      answer: item.ja,
      explanation: `${item.en} = ${item.ja}`,
      example: item.ex,
    };
  }
  return {
    prompt: item.ja,
    promptIsEn: false,
    hint: `${TOPIC_LABEL[item.topic] || item.topic} · 英訳として最も適切なものは？`,
    topic: item.topic,
    options: opts.map(o => o.en),
    answer: item.en,
    explanation: `${item.ja} = ${item.en}`,
    example: item.ex,
  };
}

// Phrases: EN phrase -> JA meaning
function genPhraseQ(direction) {
  const dir = direction === 'mix' ? (Math.random() < 0.5 ? 'en2ja' : 'ja2en') : direction;
  const item = rand(PHRASES);
  const distractors = pick(PHRASES.filter(p => p.en !== item.en), 3);
  const opts = shuffle([item, ...distractors]);
  if (dir === 'en2ja') {
    return {
      prompt: item.en,
      promptIsEn: true,
      hint: `定型表現の意味は？`,
      options: opts.map(o => o.ja),
      answer: item.ja,
      explanation: `${item.en} → ${item.ja}`,
      example: item.ex,
    };
  }
  return {
    prompt: item.ja,
    promptIsEn: false,
    hint: `この意味になる英語表現は？`,
    options: opts.map(o => o.en),
    answer: item.en,
    explanation: `${item.ja} → ${item.en}`,
    example: item.ex,
  };
}

// Current events: cloze
function genCurrentQ() {
  const item = rand(CURRENT);
  const display = item.text.replace('___', '_____');

}

// Numbers: 万/億/兆 conversion - critical for interpreters
function genNumberQ() {
  const dir = Math.random() < 0.5 ? 'ja2en' : 'en2ja';
  // generate a base number 1..9999 and a Japanese unit
  const units = [
    { ja: '万', factor: 1e4, en: 'ten thousand' },
    { ja: '億', factor: 1e8, en: 'hundred million' },
    { ja: '兆', factor: 1e12, en: 'trillion' },
  ];
  const u = rand(units);
  const num = Math.floor(Math.random() * 999) + 1;
  const total = num * u.factor;

  // Build EN form (compact: 99 million / 1.5 billion etc)
  const en = formatEnNumber(total);
  const ja = `${num.toLocaleString('ja-JP')}${u.ja}`;

  // Generate distractors by perturbing number
  const distract = new Set();
  while (distract.size < 3) {
    const perturb = Math.random() < 0.5
      ? num * (Math.random() < 0.5 ? 10 : 0.1)
      : (Math.floor(Math.random() * 999) + 1);
    const tNum = Math.max(1, Math.round(perturb));
    if (tNum === num) continue;
    if (dir === 'ja2en') {
      const totVal = tNum * u.factor;
      distract.add(formatEnNumber(totVal));
    } else {
      // alter unit too sometimes
      const altU = Math.random() < 0.4 ? rand(units.filter(x => x.ja !== u.ja)) : u;
      distract.add(`${tNum.toLocaleString('ja-JP')}${altU.ja}`);
    }
  }

  if (dir === 'ja2en') {
    return {
      prompt: ja,
      promptIsEn: false,
      hint: `数字を英語に。通訳で頻出。`,
      options: shuffle([en, ...distract]),
      answer: en,
      explanation: `${ja} = ${en} (${total.toLocaleString('en-US')})`,
      example: `桁の換算: 1万=10,000 / 1億=100 million / 1兆=1 trillion`,
    };
  }
  return {
    prompt: en,
    promptIsEn: true,
    hint: `英語の数字を日本語の単位（万・億・兆）に。`,
    options: shuffle([ja, ...distract]),
    answer: ja,
    explanation: `${en} = ${ja} (${total.toLocaleString('en-US')})`,
    example: `桁の換算: 1万=10,000 / 1億=100 million / 1兆=1 trillion`,
  };
}

function formatEnNumber(n) {
  // Express in trillion / billion / million / thousand
  const abs = Math.abs(n);
  let val, unit;
  if (abs >= 1e12) { val = n / 1e12; unit = 'trillion'; }
  else if (abs >= 1e9) { val = n / 1e9; unit = 'billion'; }
  else if (abs >= 1e6) { val = n / 1e6; unit = 'million'; }
  else if (abs >= 1e3) { val = n / 1e3; unit = 'thousand'; }
  else return n.toLocaleString('en-US');
  // Format: drop trailing zeros, keep up to 3 sig
  let s = (Math.round(val * 1000) / 1000).toString();
  return `${s} ${unit}`;
}

// Sight translation: pick best EN rendering for given JA (or vice versa)
function genSightQ() {
  const dir = Math.random() < 0.5 ? 'ja2en' : 'en2ja';
  const item = rand(SIGHT);
  const distractors = pick(SIGHT.filter(s => s.en !== item.en), 3);
  if (dir === 'ja2en') {
    return {
      prompt: item.ja,
      promptIsEn: false,
      hint: `自然な放送英語として最も適切な訳は？`,
      options: shuffle([item.en, ...distractors.map(d => d.en)]),
      answer: item.en,
      explanation: `参考: ${item.ja} → ${item.en}`,
      example: '',
    };
  }
  return {
    prompt: item.en,
    promptIsEn: true,
    hint: `この英文に対応する自然な日本語は？`,
    options: shuffle([item.ja, ...distractors.map(d => d.ja)]),
    answer: item.ja,
    explanation: `参考: ${item.en} → ${item.ja}`,
    example: '',
  };
}

let quiz = null;

function startQuiz(cat, opts) {
  const conf = CATEGORIES[cat];
  const questions = [];
  for (let i = 0; i < opts.count; i++) {
    const q = conf.wantsDir ? conf.gen(opts.dir) : conf.gen();
    questions.push(q);
  }
  quiz = {
    cat, conf, opts, questions,
    idx: 0, correct: 0, streakNow: 0, streakBest: 0,
    answers: [], timer: null, deadline: null, locked: false,
  };
  renderQuestion();
}

function renderQuestion() {
  const q = quiz.questions[quiz.idx];
  quiz.locked = false;
  const total = quiz.questions.length;
  const pct = (quiz.idx / total) * 100;

  SCREEN.innerHTML = `
    <div class="quiz">
      <div class="qhead">
        <span>${quiz.conf.title}</span>
        <span>問題 ${quiz.idx + 1} / ${total} · ストリーク ${quiz.streakNow}</span>
      </div>
      <div class="progress"><div style="width:${pct}%"></div></div>
      ${quiz.opts.time > 0 ? `<div class="timer-bar" id="timerBar"><div></div></div>` : ''}
      <div class="qprompt" id="qprompt">${q.prompt}${q.promptIsEn ? '<button class="speak-btn" id="speakBtn" title="読み上げ">🔊</button>' : ''}</div>
      <div class="qhint">
        ${q.topic ? `<span class="topic">${TOPIC_LABEL[q.topic] || q.topic}</span>` : ''}
        ${q.hint || ''}
      </div>
      <div class="opts" id="opts">
        ${q.options.map((opt, i) => `
          <button class="opt" data-i="${i}">
            <span class="key">${i + 1}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div id="feedback"></div>
      <div class="qfooter">
        <button class="btn ghost" id="quitBtn">中断して戻る</button>
        <div></div>
      </div>
    </div>
  `;

  document.querySelectorAll('.opt').forEach(b => {
    b.addEventListener('click', () => answer(parseInt(b.dataset.i, 10)));
  });
  document.getElementById('quitBtn').addEventListener('click', () => {
    if (quiz.timer) clearInterval(quiz.timer);
    renderHome();
  });
  const sb = document.getElementById('speakBtn');
  if (sb) sb.addEventListener('click', () => speak(q.prompt));

  // Keyboard
  document.onkeydown = (e) => {
    if (quiz.locked) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); next(); }
      return;
    }
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= q.options.length) answer(n - 1);
  };

  if (quiz.opts.tts && q.promptIsEn) speak(q.prompt);

  if (quiz.opts.time > 0) startTimer(quiz.opts.time);
}

function startTimer(seconds) {
  const bar = document.querySelector('#timerBar > div');
  const wrap = document.getElementById('timerBar');
  const start = Date.now();
  const ms = seconds * 1000;
  quiz.deadline = start + ms;
  if (quiz.timer) clearInterval(quiz.timer);
  quiz.timer = setInterval(() => {
    const left = quiz.deadline - Date.now();
    const pct = Math.max(0, (left / ms) * 100);
    if (bar) bar.style.width = pct + '%';
    if (wrap) wrap.classList.toggle('danger', left < ms * 0.3);
    if (left <= 0) {
      clearInterval(quiz.timer);
      if (!quiz.locked) answer(-1); // timeout
    }
  }, 80);
}

function answer(idx) {
  if (quiz.locked) return;
  quiz.locked = true;
  if (quiz.timer) clearInterval(quiz.timer);

  const q = quiz.questions[quiz.idx];
  const buttons = [...document.querySelectorAll('.opt')];
  const correctIdx = q.options.indexOf(q.answer);
  const isCorrect = idx === correctIdx;
  const isTimeout = idx === -1;

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct');
    if (i === idx && !isCorrect) b.classList.add('wrong');
  });

  if (isCorrect) {
    quiz.correct++;
    quiz.streakNow++;
    if (quiz.streakNow > quiz.streakBest) quiz.streakBest = quiz.streakNow;
  } else {
    quiz.streakNow = 0;
  }

  quiz.answers.push({
    q: q.prompt, picked: idx === -1 ? '(時間切れ)' : q.options[idx],
    answer: q.answer, ok: isCorrect, explanation: q.explanation, example: q.example,
  });

  const fb = document.getElementById('feedback');
  fb.innerHTML = `
    <div class="feedback ${isCorrect ? 'ok' : 'ng'}">
      <strong>${isCorrect ? '✓ 正解' : isTimeout ? '⌛ 時間切れ' : '✗ 不正解'}</strong>
      ${q.explanation ? `<div>${q.explanation}</div>` : ''}
      ${q.example ? `<div class="ex">例: ${q.example}</div>` : ''}
    </div>
    <div class="qfooter" style="margin-top:14px;">
      <button class="btn ghost" id="quitBtn2">中断</button>
      <button class="btn" id="nextBtn">${quiz.idx + 1 >= quiz.questions.length ? '結果を見る' : '次へ (Enter)'}</button>
    </div>
  `;
  document.getElementById('nextBtn').addEventListener('click', next);
  document.getElementById('quitBtn2').addEventListener('click', () => {
    document.onkeydown = null;
    renderHome();
  });
}

function next() {
  quiz.idx++;
  if (quiz.idx >= quiz.questions.length) renderResult();
  else renderQuestion();
}

function renderResult() {
  document.onkeydown = null;
  const total = quiz.questions.length;
  const pct = Math.round((quiz.correct / total) * 100);
  const score = quiz.correct * 100 + quiz.streakBest * 20;

  // Persist
  if (score > (stats.high || 0)) stats.high = score;
  if (quiz.streakBest > (stats.bestStreak || 0)) stats.bestStreak = quiz.streakBest;
  stats.byCat = stats.byCat || {};
  stats.byCat[quiz.cat] = stats.byCat[quiz.cat] || { played: 0, correct: 0, total: 0 };
  stats.byCat[quiz.cat].played++;
  stats.byCat[quiz.cat].correct += quiz.correct;
  stats.byCat[quiz.cat].total += total;
  saveStats(stats);
  refreshHeader();

  let comment;
  if (pct === 100) comment = '完璧。同通卓に座れます。';
  else if (pct >= 90) comment = '放送水準。引き続き語彙の幅を広げましょう。';
  else if (pct >= 75) comment = '実用域。瞬発力を上げると本番で効きます。';
  else if (pct >= 50) comment = '基礎は固め中。トピック別に弱点を絞りましょう。';
  else comment = 'まずは語彙とフレーズの定着から。例文ごと音読推奨。';

  SCREEN.innerHTML = `
    <div class="result">
      <h2>${quiz.conf.title}</h2>
      <div class="score">${pct}%</div>
      <div style="color:var(--sub); font-size:14px;">${comment}</div>
      <div class="breakdown">
        <div class="b"><div class="v">${quiz.correct}/${total}</div><div class="l">Correct</div></div>
        <div class="b"><div class="v">${quiz.streakBest}</div><div class="l">Best Streak</div></div>
        <div class="b"><div class="v">${score}</div><div class="l">Score</div></div>
      </div>
      <div class="actions">
        <button class="btn" id="retryBtn">同じカテゴリーをもう一度</button>
        <button class="btn ghost" id="homeBtn">カテゴリー選択へ</button>
      </div>
      <div class="review">
        <h4>復習 — 出題と解答</h4>
        ${quiz.answers.map(a => `
          <div class="item ${a.ok ? 'ok' : 'ng'}">
            <div class="q">${a.q}</div>
            <div class="a">正解: <strong>${a.answer}</strong>${!a.ok ? ` ／ あなたの解答: ${a.picked}` : ''}${a.example ? `<br>${a.example}` : ''}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => startQuiz(quiz.cat, quiz.opts));
  document.getElementById('homeBtn').addEventListener('click', renderHome);
}

/* ============================================================================
   TTS (Web Speech API)
============================================================================ */
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  // Strip any HTML markers (e.g. underscores stay)
  const utt = new SpeechSynthesisUtterance(text.replace(/_____/g, 'blank'));
  utt.lang = 'en-US';
  utt.rate = 1.0;
  utt.pitch = 1.0;
  speechSynthesis.cancel();
  speechSynthesis.speak(utt);
}

renderHome();
</script>
